<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credlyst Quick Finder</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="app">
        <!-- Auth State: Login Form -->
        <div id="view-login" class="view">
            <div class="popup-header">
                <div class="brand">
                    <img src="../icons/icon48.png" alt="Credlyst" width="22" height="22" style="border-radius: 4px;">
                    <span class="brand-name">Credlyst</span>
                </div>
            </div>

            <div class="popup-body">
                <h2 class="popup-title">Sign in</h2>
                <p class="popup-subtitle">Access your saved links on any website</p>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="name@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-wrap">
                            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                            <button type="button" id="toggle-password" class="toggle-pwd-btn" aria-label="Toggle password visibility">
                                <svg id="eye-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg id="eye-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="login-error" class="error-msg hidden"></div>
                    <button type="submit" id="login-btn" class="btn btn-primary">
                        <span id="login-btn-text">Sign in</span>
                        <div id="login-spinner" class="btn-spinner hidden"></div>
                    </button>
                </form>

                <p class="signin-link">
                    Don't have an account?
                    <a href="https://credlyst.ijas.space" target="_blank">Sign up</a>
                </p>
            </div>
        </div>

        <!-- Auth State: Dashboard -->
        <div id="view-dashboard" class="view">
            <div class="popup-header">
                <div class="brand">
                    <img src="../icons/icon48.png" alt="Credlyst" width="22" height="22" style="border-radius: 4px;">
                    <span class="brand-name">Credlyst</span>
                </div>
                <button id="logout-btn" class="icon-btn" aria-label="Sign out" title="Sign out">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>

            <div class="popup-body">
                <div class="user-info" id="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <div class="user-details">
                        <div class="user-name" id="user-name">Loading...</div>
                        <div class="user-email" id="user-email"></div>
                    </div>
                    <div class="user-badge">Active</div>
                </div>

                <div class="shortcut-card">
                    <div class="shortcut-card-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </div>
                    <div class="shortcut-card-body">
                        <div class="shortcut-card-title">Quick Finder</div>
                        <div class="shortcut-card-sub">Focus any input field, then press:</div>
                        <div class="shortcut-keys">
                            <kbd>Ctrl</kbd>
                            <span>+</span>
                            <kbd>Shift</kbd>
                            <span>+</span>
                            <kbd>F</kbd>
                        </div>
                    </div>
                </div>

                <div class="stats-row" id="stats-row">
                    <div class="stat-box">
                        <div class="stat-num" id="stat-total">—</div>
                        <div class="stat-label">Total Links</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num" id="stat-favorites">—</div>
                        <div class="stat-label">Favorites</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num" id="stat-categories">—</div>
                        <div class="stat-label">Categories</div>
                    </div>
                </div>

                <a href="https://credlyst.ijas.space" target="_blank" class="btn btn-outline btn-block">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                    </svg>
                    Open Credlyst
                </a>
            </div>
        </div>

        <!-- Loading state -->
        <div id="view-loading" class="view">
            <div class="popup-loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
